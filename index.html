<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Chia Xe Đi Chơi</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #FF6B35;
  --primary-dark: #e85d04;
  --secondary: #FFD166;
  --accent: #06D6A0;
  --dark: #0d1117;
  --dark2: #161b22;
  --dark3: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --male: #58a6ff;
  --female: #f778ba;
  --male-bg: rgba(88,166,255,0.12);
  --female-bg: rgba(247,120,186,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255,107,53,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(88,166,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(6,214,160,0.04) 0%, transparent 50%),
    var(--dark);
  z-index: 0; pointer-events: none;
}
.page { position: relative; z-index: 1; }

/* HEADER */
.site-header {
  background: rgba(22,27,34,0.95);
  border-bottom: 1px solid var(--border);
  padding: 14px 0;
  backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 100;
}
.site-header h1 {
  font-family: 'Baloo 2', cursive; font-weight: 800;
  font-size: 1.55rem; color: var(--primary); letter-spacing: 0.5px;
}
.site-header .sub { font-size: 0.78rem; color: var(--text-muted); }

/* CARDS */
.card-dark {
  background: var(--dark2); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  animation: fadeUp 0.35s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
.sec-hdr {
  padding: 12px 18px; font-family: 'Baloo 2',cursive;
  font-weight: 700; font-size: 0.92rem;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.sec-hdr.male   { background: var(--male-bg); color: var(--male); }
.sec-hdr.female { background: var(--female-bg); color: var(--female); }
.sec-hdr.orange { background: rgba(255,107,53,0.1); color: var(--primary); }
.sec-hdr.green  { background: rgba(6,214,160,0.1); color: var(--accent); }

/* INPUTS */
.name-row {
  display:flex; align-items:center; gap:10px;
  padding:8px 16px; border-bottom:1px solid rgba(48,54,61,0.5);
  transition:background 0.15s;
}
.name-row:last-child { border-bottom:none; }
.name-row:hover { background:rgba(255,255,255,0.02); }
.num-b {
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:0.68rem;font-weight:800;color:#fff;
}
.num-b.m { background:var(--male); }
.num-b.f { background:var(--female); }
.ni {
  flex:1; background:var(--dark3); border:1px solid var(--border);
  border-radius:8px; padding:7px 12px; color:var(--text);
  font-family:'Nunito',sans-serif; font-size:0.88rem;
  outline:none; transition:border-color 0.2s, box-shadow 0.2s;
}
.ni:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(255,107,53,0.15); }
.ni::placeholder { color:var(--text-muted); }

/* COUNTER */
.ctr-wrap { display:flex;align-items:center;justify-content:center;gap:16px;padding:18px 16px; }
.ctr-btn {
  width:40px;height:40px;border-radius:50%;border:2px solid;background:transparent;
  font-size:1.3rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.ctr-btn.m { border-color:var(--male);color:var(--male); }
.ctr-btn.m:hover { background:var(--male-bg); }
.ctr-btn.f { border-color:var(--female);color:var(--female); }
.ctr-btn.f:hover { background:var(--female-bg); }
.ctr-num {
  font-family:'Baloo 2',cursive;font-size:2.6rem;font-weight:800;
  min-width:54px;text-align:center;color:var(--text);
}

/* BUTTONS */
.btn-main {
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;border:none;border-radius:50px;
  font-family:'Baloo 2',cursive;font-weight:700;font-size:0.98rem;
  padding:12px 34px;cursor:pointer;
  box-shadow:0 4px 18px rgba(255,107,53,0.35);transition:all 0.2s;
}
.btn-main:hover { transform:translateY(-2px); box-shadow:0 8px 26px rgba(255,107,53,0.45); }
.btn-main:active { transform:translateY(0); }
.btn-main:disabled { opacity:0.45;cursor:not-allowed;transform:none; }
.btn-ghost {
  background:transparent;border:1px solid var(--border);color:var(--text-muted);
  border-radius:8px;padding:6px 14px;font-size:0.82rem;cursor:pointer;
  transition:all 0.15s;font-family:'Nunito',sans-serif;
}
.btn-ghost:hover { border-color:var(--text-muted);color:var(--text); }

/* GUIDE */
.g-step {
  display:flex;gap:12px;align-items:flex-start;
  padding:10px 0;border-bottom:1px solid rgba(48,54,61,0.4);
}
.g-step:last-child { border-bottom:none; }
.g-num {
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;font-size:0.72rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.g-txt { font-size:0.84rem;color:var(--text);line-height:1.55; }
.g-txt a { color:var(--male);text-decoration:none; }
.g-txt a:hover { text-decoration:underline; }
.g-txt code {
  background:var(--dark3);border:1px solid var(--border);
  border-radius:4px;padding:1px 6px;font-size:0.78rem;color:var(--secondary);
}

/* MEMBER GRID */
.m-grid {
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;padding:16px;
}
.m-card {
  background:var(--dark3);border:1.5px solid var(--border);
  border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;
  transition:all 0.2s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;animation:popIn 0.4s ease both;
}
@keyframes popIn { from{opacity:0;transform:scale(0.75)} to{opacity:1;transform:scale(1)} }
.m-card:hover:not(.matched) { transform:translateY(-4px) scale(1.04); }
.m-card.mc { border-color:rgba(88,166,255,0.3); }
.m-card.mc:hover:not(.matched) { border-color:var(--male);box-shadow:0 8px 22px rgba(88,166,255,0.18); }
.m-card.fc { border-color:rgba(247,120,186,0.3); }
.m-card.fc:hover:not(.matched) { border-color:var(--female);box-shadow:0 8px 22px rgba(247,120,186,0.18); }
.m-card.matched { opacity:0.5;cursor:default; }
.av {
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.45rem;margin:0 auto 9px;
}
.mc .av { background:var(--male-bg); }
.fc .av { background:var(--female-bg); }
.mn { font-weight:800;font-size:0.88rem;color:var(--text);margin-bottom:4px; }
.mt { font-size:0.67rem;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block; }
.mt.m { background:var(--male-bg);color:var(--male); }
.mt.f { background:var(--female-bg);color:var(--female); }
.mb-badge {
  position:absolute;top:5px;right:5px;background:var(--accent);color:#fff;
  font-size:0.58rem;font-weight:800;padding:2px 6px;border-radius:10px;
}
.mw { font-size:0.68rem;color:var(--accent);font-weight:700;margin-top:5px; }

/* PROGRESS */
.pb-wrap { background:var(--dark3);border-radius:10px;height:8px;overflow:hidden; }
.pb-fill { height:100%;background:linear-gradient(90deg,var(--accent),#05c187);border-radius:10px;transition:width 0.5s ease; }

/* SPIN OVERLAY */
#spinOverlay {
  display:none;position:fixed;inset:0;
  background:rgba(13,17,23,0.97);z-index:9999;
  align-items:center;justify-content:center;flex-direction:column;gap:22px;
  backdrop-filter:blur(8px);
}
#spinOverlay.show { display:flex; }
.spin-ttl { font-family:'Baloo 2',cursive;font-size:1.25rem;font-weight:700;color:var(--text);text-align:center; }
.slot-wrap {
  width:280px;height:80px;background:var(--dark2);
  border:1.5px solid var(--border);border-radius:16px;overflow:hidden;position:relative;
}
.slot-wrap::before,.slot-wrap::after {
  content:'';position:absolute;left:0;right:0;height:22px;z-index:2;pointer-events:none;
}
.slot-wrap::before { top:0;background:linear-gradient(to bottom,var(--dark2),transparent); }
.slot-wrap::after  { bottom:0;background:linear-gradient(to top,var(--dark2),transparent); }
.slot-inner { position:absolute;width:100%; }
.slot-item {
  height:80px;display:flex;align-items:center;justify-content:center;
  font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:700;color:var(--text);gap:8px;
}
.res-card {
  background:var(--dark2);border:1px solid var(--border);
  border-radius:22px;padding:26px 30px;text-align:center;
  max-width:310px;width:90%;
  animation:resPop 0.45s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 24px 60px rgba(0,0,0,0.5);
}
@keyframes resPop { from{opacity:0;transform:scale(0.5) rotate(-4deg)} to{opacity:1;transform:scale(1) rotate(0)} }
.re { font-size:3.2rem;margin-bottom:6px; }
.rl { font-size:0.78rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px; }
.rp { font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:var(--text); }
.ri {
  background:rgba(6,214,160,0.1);border:1px solid rgba(6,214,160,0.22);
  border-radius:10px;padding:9px 14px;margin-top:14px;
  font-size:0.82rem;color:var(--accent);font-weight:600;
}
.btn-ok {
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;border:none;border-radius:50px;
  padding:10px 30px;font-family:'Baloo 2',cursive;font-size:0.95rem;
  font-weight:700;cursor:pointer;margin-top:14px;
  box-shadow:0 4px 14px rgba(255,107,53,0.35);transition:all 0.2s;
}
.btn-ok:hover { transform:translateY(-2px); }

/* PAIR ROW */
.pair-row {
  background:var(--dark3);border:1px solid var(--border);
  border-radius:12px;padding:11px 14px;
  display:flex;align-items:center;gap:10px;
  animation:fadeUp 0.3s ease both;
}
.pav {
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:0.95rem;
}
.pav.m { background:var(--male-bg); }
.pav.f { background:var(--female-bg); }
.pnames { font-weight:800;font-size:0.86rem; }
.plabel { font-size:0.72rem;color:var(--text-muted);margin-top:1px; }

/* LINK BOX */
.link-box {
  background:var(--dark3);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;
  display:flex;align-items:center;gap:10px;
}
.link-url { flex:1;font-size:0.78rem;color:var(--male);word-break:break-all;font-family:monospace; }
.btn-copy {
  background:rgba(88,166,255,0.1);border:1px solid rgba(88,166,255,0.2);
  color:var(--male);border-radius:7px;padding:5px 11px;
  font-size:0.76rem;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:all 0.15s;flex-shrink:0;
}
.btn-copy:hover { background:rgba(88,166,255,0.18); }

/* TOAST */
.toast-wrap {
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  z-index:10000;display:flex;flex-direction:column;gap:7px;align-items:center;
}
.toast-msg {
  background:var(--dark2);border:1px solid var(--border);
  color:var(--text);font-size:0.83rem;font-weight:600;
  padding:9px 18px;border-radius:50px;
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  animation:tIn 0.3s ease;
}
@keyframes tIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* LOADER */
.loader {
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--border);border-top-color:var(--primary);
  animation:spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* LIVE DOT */
.live-dot {
  width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;
  box-shadow:0 0 0 0 rgba(6,214,160,0.5);animation:lp 2s infinite;
}
@keyframes lp {
  0%{box-shadow:0 0 0 0 rgba(6,214,160,0.5)}
  70%{box-shadow:0 0 0 6px rgba(6,214,160,0)}
  100%{box-shadow:0 0 0 0 rgba(6,214,160,0)}
}

/* CONFETTI */
.cf {
  position:fixed;pointer-events:none;z-index:10001;
  border-radius:2px;opacity:0;animation:cfF linear forwards;
}
@keyframes cfF {
  0%{opacity:1;transform:translateY(0) rotate(0deg)}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}

.alert-info {
  background:rgba(88,166,255,0.07);border:1px solid rgba(88,166,255,0.18);
  border-radius:12px;padding:12px 16px;font-size:0.84rem;color:var(--text);line-height:1.5;
}
.alert-warn {
  background:rgba(255,209,102,0.07);border:1px solid rgba(255,209,102,0.22);
  border-radius:12px;padding:12px 16px;font-size:0.84rem;color:var(--secondary);font-weight:600;
}

.btn-random-big {
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  color: #fff; border: none; border-radius: 50px;
  font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 1.15rem;
  padding: 16px 44px; cursor: pointer; letter-spacing: 0.3px;
  box-shadow: 0 6px 28px rgba(168,85,247,0.45);
  transition: all 0.2s;
  position: relative; overflow: hidden;
}
.btn-random-big::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  border-radius: 50px;
}
.btn-random-big:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 36px rgba(168,85,247,0.55); }
.btn-random-big:active { transform: translateY(0) scale(0.98); }

@media(max-width:576px){
  .m-grid{grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;}
  .m-card{padding:11px 6px;}
  .av{width:40px;height:40px;font-size:1.2rem;}
  .res-card{padding:20px 18px;}
}
</style>
</head>
<body>
<div class="page">

<!-- HEADER -->
<div class="site-header">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h1>🚗 Chia Xe Đi Chơi</h1>
        <div class="sub">Real-time · Nhiều thiết bị · Firebase</div>
      </div>
      <div id="hdr-right"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="container mt-4 pb-5" id="app">
  <div class="d-flex justify-content-center align-items-center" style="min-height:280px">
    <div class="loader"></div>
  </div>
</div>

<!-- SPIN OVERLAY -->
<div id="spinOverlay">
  <div class="spin-ttl" id="spinTitle">✨ Đang tìm bạn đồng hành...</div>
  <div class="slot-wrap"><div class="slot-inner" id="slotInner"></div></div>
  <div id="resultArea" style="display:none">
    <div class="res-card">
      <div class="re" id="rEmoji">🎉</div>
      <div class="rl">Bạn sẽ đi cùng</div>
      <div class="rp" id="rPartner"></div>
      <div class="ri" id="rInfo"></div>
      <button class="btn-ok" onclick="closeResult()">Xác nhận! 🎊</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, push, serverTimestamp, runTransaction }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ╔══════════════════════════════════════════╗
// ║  PASTE FIREBASE CONFIG CỦA BẠN VÀO ĐÂY  ║
// ╚══════════════════════════════════════════╝
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBNv5EeDA9J0cTz77NpWWKt6P0MMVP4kVA",
  authDomain: "carpool-match-2f169.firebaseapp.com",
  projectId: "carpool-match-2f169",
  storageBucket: "carpool-match-2f169.firebasestorage.app",
  messagingSenderId: "1022641947512",
  appId: "1:1022641947512:web:c114cf61f803bef4f23e8d",
  measurementId: "G-R8J4W5SBV5",
  databaseURL: "https://carpool-match-2f169-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

// ── utils ──────────────────────────────────
const $  = id => document.getElementById(id);
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };

function toast(msg, ms=3000) {
  const w=$('toastWrap'), d=el('div','toast-msg'); d.textContent=msg;
  w.appendChild(d); setTimeout(()=>d.remove(), ms);
}

function confetti() {
  const c=['#FF6B35','#FFD166','#06D6A0','#58a6ff','#f778ba'];
  for(let i=0;i<55;i++){
    const d=el('div','cf'); const s=7+Math.random()*9;
    d.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${c[~~(Math.random()*c.length)]};width:${s}px;height:${s}px;animation-duration:${1.6+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(d); setTimeout(()=>d.remove(),3800);
  }
}

function isConfigured() { return !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.databaseURL); }
function getSessionId() { return new URLSearchParams(location.search).get('s'); }
function shareUrl(sid)  { return `${location.origin}${location.pathname}?s=${sid}`; }

function copyText(txt) {
  navigator.clipboard.writeText(txt).then(()=>toast('✅ Đã copy link!')).catch(()=>prompt('Copy link:',txt));
}
window.copyText = copyText;

// ── Slot machine ────────────────────────────
function runSlot(pool, winner, members, cb) {
  const si=$('slotInner');
  const names=[]; const R=18;
  for(let r=0;r<R;r++) names.push(...[...pool].sort(()=>Math.random()-.5));
  names.push(winner);
  const H=80;
  si.innerHTML=names.map(n=>{
    const m=members.find(x=>x.name===n);
    return `<div class="slot-item">${m?.gender==='female'?'👩':'👨'} ${n}</div>`;
  }).join('');
  si.style.transition='none'; si.style.transform='translateY(0)';
  let cnt=0, spd=45;
  const total=names.length-1, fast=total-pool.length;
  function tick(){
    if(cnt>=total){ si.style.transition='transform 0.3s ease'; si.style.transform=`translateY(-${total*H}px)`; setTimeout(cb,380); return; }
    cnt++;
    si.style.transition=`transform ${spd}ms linear`;
    si.style.transform=`translateY(-${cnt*H}px)`;
    const r=cnt/fast; spd=r<.4?45:r<.7?75:r<.88?120:r<.96?190:290;
    setTimeout(tick,spd);
  }
  setTimeout(tick,80);
}

// ══════════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════════

// ── Config guide screen ──────────────────────
function showConfigScreen() {
  $('hdr-right').innerHTML='';
  $('app').innerHTML=`
  <div class="row g-4 justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card-dark">
        <div class="sec-hdr orange">⚙️ Cài đặt Firebase — Chỉ cần làm 1 lần duy nhất</div>
        <div class="p-4">
          <div class="alert-info mb-4">
            App dùng <strong>Firebase Realtime Database</strong> để đồng bộ real-time.
            Hoàn toàn <strong>miễn phí</strong> cho nhóm nhỏ. Làm theo hướng dẫn rồi paste config vào file HTML.
          </div>
          <div style="font-family:'Baloo 2',cursive;font-weight:700;font-size:1rem;color:var(--secondary);margin-bottom:12px">📋 Hướng dẫn từng bước</div>
          <div class="g-step">
            <div class="g-num">1</div>
            <div class="g-txt">Truy cập <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> → Đăng nhập Google</div>
          </div>

// ── Session / game screen ────────────────────
let curSid=null, unsubFn=null;

function startSession(sid, members, matches, isNew) {
  curSid=sid;
  renderGameScreen(sid, members, matches, isNew);
  // Subscribe realtime
  if(unsubFn) unsubFn();
  unsubFn = onValue(ref(db,`sessions/${sid}`), snap=>{
    if(!snap.exists()) return;
    const d=snap.val();
    renderGrid(d.members, d.matches||{});
    renderPairs(uniquePairs(d.matches||{}, d.members), d.members);
    updateProgress(d.members.length, Object.keys(d.matches||{}).length);
  });
}

function renderGrid(members, matches) {
  const g=$('mGrid'); if(!g) return; g.innerHTML='';
  members.forEach((m,i)=>{
    const matched=!!matches[m.name];
    const partner=matches[m.name]||'';

    const tc=m.gender==='male'?'m':'f';
    const tt=m.gender==='male'?'🚗 Lái':'🧡 Khách';
    const em=m.gender==='male'?'👨':'👩';
    g.innerHTML+=`
      <div class="m-card ${gc}${matched?' matched':''}" onclick="${matched?'':'pickMe(\''+m.name+'\')'}" style="animation-delay:${i*.04}s">
        <div class="av">${em}</div>
        <div class="mn">${m.name}</div>
        <span class="mt ${tc}">${tt}</span>
        ${matched?`<div class="mb-badge">✓</div><div class="mw">↔ ${partner}</div>`:''}
      </div>`;
  });
}

function renderPairs(pairs, members) {
  const pl=$('pList'), ps=$('pSection'); if(!pl) return;
  ps.style.display=pairs.length?'block':'none';
  pl.innerHTML='';
  pairs.forEach(([a,b])=>{
    const pa=members.find(m=>m.name===a), pb=members.find(m=>m.name===b);
    const ea=pa?.gender==='male'?'👨':'👩', eb=pb?.gender==='male'?'👨':'👩';
    const lbl=pa?.gender==='male'?`🚗 ${a} chở ${b}`:pb?.gender==='male'?`🚗 ${b} chở ${a}`:`🚕 ${a} & ${b} đi chung`;
    pl.innerHTML+=`
      <div class="col-md-6 col-lg-4">
        <div class="pair-row">
          <div class="pav ${pa?.gender==='male'?'m':'f'}">${ea}</div>
          <div style="flex:1"><div class="pnames">${a} & ${b}</div><div class="plabel">${lbl}</div></div>
          <div class="pav ${pb?.gender==='male'?'m':'f'}">${eb}</div>
        </div>
      </div>`;
  });
}

function updateProgress(total, mc) {
  const pb=$('pbFill'), cnt=$('mcCnt'), st=$('stTxt');
  if(pb) pb.style.width=(mc/total*100)+'%';
  if(cnt) cnt.textContent=mc;
  if(st) st.textContent=mc===total?'🎉 Xong hết rồi!':'Click tên của bạn để random!';
}

function uniquePairs(matches, members) {
  const seen=new Set(), pairs=[];
  for(const [a,b] of Object.entries(matches)){
    const k=[a,b].sort().join('|');
    if(!seen.has(k)){seen.add(k);pairs.push([a,b]);}
  }
  return pairs;
}

// ── Pick & spin ──────────────────────────────

// Core: compute pool for a person given current matches
function getPool(name, members, matches) {
  const takenNames = new Set([...Object.keys(matches), ...Object.values(matches)]);
  const avMales   = members.filter(m => m.gender==='male'   && !takenNames.has(m.name)).map(m=>m.name);
  const avFemales = members.filter(m => m.gender==='female' && !takenNames.has(m.name)).map(m=>m.name);
  const person    = members.find(m => m.name===name);
  if (person.gender === 'male') return avFemales;
  // Female: match with males if available, else with other unmatched females
  return avMales.length > 0 ? avMales : avFemales.filter(n => n !== name);
}

// Core spin: animate then atomically save via transaction
function doSpin(name, members, matchesSnapshot) {
  const pool = getPool(name, members, matchesSnapshot);
  if (!pool.length) { toast('Không còn ai để ghép!'); return; }

  const person = members.find(m => m.name === name);
  const ov = $('spinOverlay');
  ov.classList.add('show');
  $('resultArea').style.display = 'none';
  $('spinTitle').textContent = `✨ ${name} đang random...`;
  $('spinTitle').style.display = 'block';

  // Pre-pick a winner for animation (may be overridden by transaction result)
  const animWinner = pool[~~(Math.random() * pool.length)];

  runSlot(pool, animWinner, members, async () => {
    // After animation: run transaction to atomically verify & write
    try {
      let finalWinner = null;

      await runTransaction(ref(db, `sessions/${curSid}/matches`), (currentMatches) => {
        currentMatches = currentMatches || {};

        // Check: is 'name' still unmatched?
        const alreadyKey = Object.keys(currentMatches).includes(name);
        const alreadyVal = Object.values(currentMatches).includes(name);
        if (alreadyKey || alreadyVal) return; // abort — already matched by someone else

        // Recompute pool from live data
        const livePool = getPool(name, members, currentMatches);
        if (!livePool.length) return; // abort — no one left

        // Pick winner: use animWinner if still available, else pick fresh
        const winner = livePool.includes(animWinner)
          ? animWinner
          : livePool[~~(Math.random() * livePool.length)];

        finalWinner = winner;
        currentMatches[name]   = winner;
        currentMatches[winner] = name;
        return currentMatches;
      });

      if (!finalWinner) {
        // Transaction aborted — someone else grabbed the spot
        toast('⚠️ Đã có người ghép trước bạn! Hãy thử lại.');
        closeResult();
        return;
      }

      showResult(name, finalWinner, person.gender, members);
    } catch(e) {
      toast('❌ Lỗi lưu kết quả: ' + e.message);
      closeResult();
    }
  });
}

window.pickMe = async function(name) {
  if (!curSid) return;
  const snap = await get(ref(db, `sessions/${curSid}`));
  if (!snap.exists()) return;
  const { members, matches={} } = snap.val();

  // Already matched → just show result
  if (matches[name]) { showAlready(name, matches[name], members); return; }
  const asP = Object.entries(matches).find(([,v]) => v === name);
  if (asP) { showAlready(name, asP[0], members); return; }

  doSpin(name, members, matches);
};

// Random button: pick a random unmatched person and spin for them
window.randomForMe = async function() {
  if (!curSid) return;
  const snap = await get(ref(db, `sessions/${curSid}`));
  if (!snap.exists()) return;
  const { members, matches={} } = snap.val();

  const takenNames = new Set([...Object.keys(matches), ...Object.values(matches)]);
  const unmatched  = members.filter(m => !takenNames.has(m.name));
  if (!unmatched.length) { toast('🎉 Mọi người đã được ghép rồi!'); return; }

  const candidates = unmatched.filter(m => getPool(m.name, members, matches).length > 0);
  if (!candidates.length) { toast('Không còn ai có thể ghép thêm!'); return; }

  const chosen = candidates[~~(Math.random() * candidates.length)];
  doSpin(chosen.name, members, matches);
};

function showResult(name, partner, gender, members) {
  const po = members.find(m => m.name === partner);
  const bothFemale = gender==='female' && po?.gender==='female';
  $('rEmoji').textContent = gender==='male' ? '🚗' : bothFemale ? '🚕' : '🧡';
  $('rPartner').textContent = partner;
  $('rInfo').textContent = gender==='male'
    ? `${name} lái xe · ${partner} ngồi cùng`
    : po?.gender==='male'
      ? `${partner} lái xe · ${name} ngồi cùng`
      : `${name} & ${partner} đi taxi/grab cùng nhau 🚕`;
  $('spinTitle').style.display = 'none';
  $('resultArea').style.display = 'block';
  confetti();
}

function showAlready(name, partner, members) {
  const po=members.find(m=>m.name===partner), pe=members.find(m=>m.name===name);
  const ov=$('spinOverlay'); ov.classList.add('show');
  const si=$('slotInner');
  si.innerHTML=`<div class="slot-item">${po?.gender==='female'?'👩':'👨'} ${partner}</div>`;
  si.style.transition='none'; si.style.transform='translateY(0)';
  const bothFemale = pe?.gender==='female' && po?.gender==='female';
  $('rEmoji').textContent='✅'; $('rPartner').textContent=partner;
  $('rInfo').textContent = pe?.gender==='male'
    ? `${name} lái xe · ${partner} ngồi cùng`
    : po?.gender==='male'
      ? `${partner} lái xe · ${name} ngồi cùng`
      : `${name} & ${partner} đi taxi/grab cùng nhau 🚕`;
  $('spinTitle').style.display='none'; $('resultArea').style.display='block';
}

window.closeResult=()=>{ $('spinOverlay').classList.remove('show'); $('spinTitle').style.display='block'; };

window.doReset=()=>{
  if(!localStorage.getItem(`creator_${curSid}`)){ toast('⛔ Chỉ người tạo mới được reset!'); return; }
  if(confirm('Reset toàn bộ kết quả ghép cặp? Mọi người sẽ random lại từ đầu.'))
    set(ref(db,`sessions/${curSid}/matches`),{}).then(()=>toast('✅ Đã reset!')).catch(e=>toast('❌ '+e.message));
};

window.goHome=()=>{
  if(unsubFn){ unsubFn(); unsubFn=null; }
  curSid=null;
  history.replaceState(null,'',location.pathname);
  MC=5; FC=7;
  showCreateScreen();
};

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
let db=null;

async function init() {
  if(!isConfigured()){ showConfigScreen(); return; }

  try {
    const app=initializeApp(FIREBASE_CONFIG);
    db=getDatabase(app);
  } catch(e){
    $('app').innerHTML=`<div class="alert-warn">❌ Lỗi kết nối Firebase: ${e.message}<br>Kiểm tra lại FIREBASE_CONFIG trong file HTML.</div>`;
    return;
  }

  const sid=getSessionId();
  if(!sid){ showCreateScreen(); return; }

  // Load existing session
  try {
    const snap=await get(ref(db,`sessions/${sid}`));
    if(!snap.exists()){
      $('app').innerHTML=`
        <div class="row justify-content-center"><div class="col-md-6 text-center">
          <div class="card-dark p-5">
            <div style="font-size:3rem;margin-bottom:10px">😕</div>
            <div style="font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:700;margin-bottom:8px">Session không tồn tại</div>
            <div style="color:var(--text-muted);font-size:0.86rem;margin-bottom:18px">Link đã hết hạn hoặc không hợp lệ.</div>
            <button class="btn-main" onclick="goHome()">Tạo session mới</button>
          </div>
        </div></div>`;
      return;
    }
    const d=snap.val();
    startSession(sid, d.members, d.matches||{}, false);
  } catch(e){
    $('app').innerHTML=`<div class="alert-warn">❌ Lỗi tải dữ liệu: ${e.message}</div>`;
  }
}

init();
